<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="/icons/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="shortcut icon" href="/icons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Rambutan" />
    <link rel="manifest" href="/icons/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0 viewport-fit=cover"
    />
    <title>Rambutan</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        background: #f8f5f1;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #4b3b2a;
        margin: 0;
      }

      #loadingoverlay {
        position: fixed;
        inset: 0;
        display: flex;
        background: #f8f5f1;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.2s;
      }

      /* Home Shell Styles */
      .shell-home {
        flex-direction: column;
        align-items: center;
        padding: 20px;
        width: 100%;
      }

      @media (min-width: 1024px) {
        .shell-home {
          padding: 40px;
        }
      }

      .shell-home .shell-container {
        max-width: 1024px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .shell-home header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 40px;
      }

      .shell-home h1 {
        font-family: "Lora", serif;
        font-size: 36px;
        line-height: 40px;
        font-weight: 500;
        color: #4b3b2a;
        margin: 0;
      }

      .shell-user-placeholder {
        width: 38px;
        height: 38px;
        border-radius: 50%;
      }

      /* Kitchen Shell Styles */
      .shell-kitchen-new {
        flex-direction: column;
        width: 100%;
        min-height: 100dvh;
      }

      .shell-kitchen-new-header {
        padding: 20px 20px 16px;
        background: #f8f5f1;
      }

      .shell-kitchen-new-header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .shell-kitchen-new-divider {
        border-bottom: 1px solid rgba(75, 59, 42, 0.1);
        margin-top: 16px;
      }

      .shell-kitchen-new-body {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: 144px;
        text-align: center;
      }

      .shell-kitchen-new-copy {
        width: 100%;
        max-width: 768px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .shell-kitchen-new-copy h2 {
        font-family: "Lora", serif;
        font-size: 32px;
        line-height: 1.2;
        font-weight: 500;
        margin: 0;
      }

      .shell-kitchen-new-copy p {
        color: #7c6a58;
        margin: 0;
      }

      .shell-kitchen-new-composer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 0 16px max(env(safe-area-inset-bottom), 8px);
      }

      .shell-kitchen-new-composer-inner {
        width: 100%;
        max-width: 768px;
        margin: 0 auto;
        border: 1px solid rgba(124, 106, 88, 0.3);
        border-radius: 24px;
        height: 44px;
        background: #f8f5f1;
      }

      .shell-kitchen-recipe {
        width: 100%;
        min-height: 100dvh;
        padding: 8px 12px 16px;
      }

      .shell-kitchen-recipe-stack {
        width: 100%;
        max-width: 896px;
        margin: 0 auto;
      }

      .shell-kitchen-recipe-card {
        min-height: calc(100dvh - 24px);
        border-radius: 24px;
        border: 1px solid rgba(75, 59, 42, 0.1);
        background: #f1eae4;
      }

      .shell-kitchen-icon {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background: rgba(75, 59, 42, 0.08);
      }

      @media (min-width: 768px) {
        .shell-kitchen-new-header {
          padding: 20px 24px 16px;
        }

        .shell-kitchen-recipe {
          padding: 8px 20px 16px;
        }
      }

      #loadingoverlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="loadingoverlay" role="progressbar" aria-busy="true"></div>
    <div id="root"></div>

    <script>
      const path = window.location.pathname;
      const loadingoverlay = document.getElementById("loadingoverlay");
      const isKitchenNewRoute = path === "/kitchen";
      const isKitchenRecipeRoute = /^\/kitchen\/[^/]+$/.test(path);

      if (isKitchenNewRoute) {
        loadingoverlay.classList.add("shell-kitchen-new");
        loadingoverlay.innerHTML = `
          <div class="shell-kitchen-new-header">
            <div class="shell-kitchen-new-header-row">
              <div class="shell-kitchen-icon"></div>
            </div>
            <div class="shell-kitchen-new-divider"></div>
          </div>
          <div class="shell-kitchen-new-body">
            <div class="shell-kitchen-new-copy">
              <h2>What recipe can I help you with?</h2>
              <p>Paste a link to any recipe, and I'll extract the ingredients and steps.</p>
              <p>Ask me to improve a recipe, healthier, quicker, or more flavorful.</p>
              <p>Ask to double, halve, or scale the recipe for any number of servings.</p>
            </div>
          </div>
          <div class="shell-kitchen-new-composer">
            <div class="shell-kitchen-new-composer-inner"></div>
          </div>
        `;
      } else if (isKitchenRecipeRoute) {
        loadingoverlay.classList.add("shell-kitchen-recipe");
        loadingoverlay.innerHTML = `
          <div class="shell-kitchen-recipe-stack">
            <div class="shell-kitchen-recipe-card"></div>
          </div>
        `;
      } else {
        // Default to Home/Landing shell
        loadingoverlay.classList.add("shell-home");
        loadingoverlay.innerHTML = `
          <div class="shell-container">
            <header>
              <h1>Rambutan</h1>
              <div class="shell-user-placeholder"></div>
            </header>
          </div>
        `;
      }

      // Failsafe: ensure the loading overlay is hidden even if JS crashes or hangs
      setTimeout(() => {
        if (loadingoverlay) {
          loadingoverlay.classList.add("fade-out");
          setTimeout(() => loadingoverlay.remove(), 200);
        }
      }, 5000);
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
