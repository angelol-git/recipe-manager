<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="/icons/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="shortcut icon" href="/icons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="AI Recipe" />
    <link rel="manifest" href="/icons/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0 viewport-fit=cover"
    />
    <title>Recipes</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        background: #f8f5f1;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #4b3b2a;
        margin: 0;
      }

      #shell {
        position: fixed;
        inset: 0;
        display: flex;
        background: #f8f5f1;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.2s;
      }

      /* Home Shell Styles */
      .shell-home {
        flex-direction: column;
        align-items: center;
        padding: 20px;
        width: 100%;
      }

      @media (min-width: 1024px) {
        .shell-home {
          padding: 40px;
        }
      }

      .shell-home .shell-container {
        max-width: 1024px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .shell-home header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 40px;
      }

      .shell-home h1 {
        font-family: "Lora", serif;
        font-size: 36px;
        line-height: 40px;
        font-weight: 500;
        color: #4b3b2a;
        margin: 0;
      }

      .shell-user-placeholder {
        width: 38px;
        height: 38px;
        border-radius: 50%;
      }

      /* Chat Shell Styles */
      .shell-chat {
        flex-direction: column;
        width: 100%;
      }

      .shell-chat-header {
        height: 49px; /* p-2 (16px) + content (~32px) + border (1px) */
        border-bottom: 1px solid #d1d5db; /* gray-300 */
        background: #f8f5f1;
        display: flex;
        align-items: center;
        padding: 8px; /* p-2 */
      }

      #shell.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="shell" role="progressbar" aria-busy="true"></div>
    <div id="root"></div>

    <script>
      const path = window.location.pathname;
      const shell = document.getElementById("shell");

      if (path.startsWith("/chat")) {
        shell.classList.add("shell-chat");
        shell.innerHTML = `
          <div class="shell-chat-header">
            <div style="width: 32px; height: 32px;"></div>
          </div>
        `;
      } else {
        // Default to Home/Landing shell
        shell.classList.add("shell-home");
        shell.innerHTML = `
          <div class="shell-container">
            <header>
              <h1>Recipes</h1>
              <div class="shell-user-placeholder"></div>
            </header>
          </div>
        `;
      }

      // Failsafe: ensure shell is hidden even if JS crashes or hangs
      setTimeout(() => {
        if (shell) {
          shell.classList.add("fade-out");
          setTimeout(() => shell.remove(), 200);
        }
      }, 5000);
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
